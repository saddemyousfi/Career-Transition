    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080c10;
            --surface: #0d1117;
            --border: #21262d;
            --border-bright: #30363d;
            --green: #3fb950;
            --green-dim: #1a7f37;
            --cyan: #58a6ff;
            --amber: #d29922;
            --text: #e6edf3;
            --text-dim: #7d8590;
            --text-muted: #484f58;
            --red: #f85149;
            --purple: #bc8cff;
        }

        html { background: var(--bg); }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: transparent;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
            pointer-events: none;
        }

        canvas#matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: auto;
            cursor: crosshair;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none;
            z-index: 1000;
        }

        .terminal {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 0 1px var(--border-bright), 0 30px 80px rgba(0,0,0,0.7);
            z-index: 1;
            pointer-events: auto;
        }

        .terminal-bar {
            background: #161b22;
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dot-row { display: flex; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: opacity 0.2s; }
        .dot:hover { opacity: 0.8; }
        .dot.red { background: #ff5f57; }
        .dot.amber { background: #febc2e; }
        .dot.green { background: #28c840; }

        .terminal-title {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .terminal-body {
            padding: 20px 24px 16px;
            min-height: 520px;
            max-height: 70vh;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        .line {
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.3s, transform 0.3s;
        }
        .line.visible { opacity: 1; transform: translateY(0); }

        .line.cmd { color: var(--green); }
        .line.output { color: var(--text-dim); }
        .line.info { color: var(--cyan); }
        .line.success { color: var(--green); }
        .line.warn { color: var(--amber); }
        .line.error { color: var(--red); }
        .line.accent { color: var(--purple); }
        .line.bright { color: var(--text); font-weight: 600; }
        .line.gap { margin-top: 8px; }

        .prompt { color: var(--green-dim); }
        .at { color: var(--text-dim); }
        .host { color: var(--cyan); }

        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--green);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
            border-radius: 1px;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .progress-section { margin-top: 8px; display: none; }
        .progress-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        .progress-bar-outer { background: var(--border); border-radius: 2px; height: 6px; width: 100%; overflow: hidden; }
        .progress-bar-inner { height: 100%; background: var(--green); width: 0%; transition: width 0.4s ease; border-radius: 2px; box-shadow: 0 0 8px var(--green); }

        .age-card { display: none; margin-top: 16px; background: #0d1117; border: 1px solid var(--border-bright); border-radius: 6px; padding: 16px 20px; border-left: 3px solid var(--cyan); }
        .age-big { font-size: 48px; font-weight: 700; color: var(--cyan); letter-spacing: -2px; line-height: 1; }
        .age-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
        .age-sub { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

        .skills-grid { display: none; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-top: 12px; }
        .skill-badge { background: #161b22; border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 11px; color: var(--text-dim); text-align: center; transition: border-color 0.3s, color 0.3s; }
        .skill-badge.loaded { border-color: var(--green-dim); color: var(--green); }

        .timeline-section { display: none; margin-top: 16px; }
        .tl-item { display: flex; gap: 12px; margin-bottom: 12px; opacity: 0; transform: translateX(-8px); transition: opacity 0.4s, transform 0.4s; }
        .tl-item.visible { opacity: 1; transform: translateX(0); }
        .tl-dot-wrap { display: flex; flex-direction: column; align-items: center; padding-top: 4px; }
        .tl-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-bright); flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s; }
        .tl-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .tl-line { width: 1px; flex: 1; background: var(--border); margin-top: 4px; min-height: 20px; }
        .tl-content { flex: 1; padding-bottom: 4px; }
        .tl-year { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; }
        .tl-role { font-size: 13px; color: var(--text); font-weight: 600; margin: 2px 0; }
        .tl-org { font-size: 12px; color: var(--cyan); }

        .cta-section { display: none; margin-top: 20px; padding: 16px; border: 1px solid var(--green-dim); border-radius: 6px; background: rgba(63, 185, 80, 0.05); }
        .cta-title { font-size: 14px; color: var(--green); font-weight: 600; margin-bottom: 8px; }
        .cta-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .cta-link { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid var(--border-bright); border-radius: 4px; font-size: 12px; color: var(--text-dim); text-decoration: none; background: #161b22; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
        .cta-link:hover { border-color: var(--cyan); color: var(--cyan); }
        .cta-link svg { width: 14px; height: 14px; fill: currentColor; }

        .input-line { display: flex; align-items: center; font-size: 13px; line-height: 1.8; opacity: 0; transition: opacity 0.3s; }
        .input-line.visible { opacity: 1; }
        .input-line .prompt-text { white-space: pre; }
        .input-cursor { display: inline-block; width: 8px; height: 14px; background: var(--green); margin-left: 2px; border-radius: 1px; animation: blink 1s step-end infinite; }
        #user-input { background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 13px; outline: none; caret-color: var(--green); flex: 1; padding: 0; margin: 0; line-height: inherit; }

        .qa-container { margin: 16px 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .qa-card { perspective: 800px; height: 160px; cursor: pointer; }
        .qa-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .qa-card.flipped .qa-card-inner { transform: rotateY(180deg); }
        .qa-card-front, .qa-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; padding: 12px; display: flex; align-items: center; justify-content: center; font-size: 12px; background: #161b22; border: 1px solid var(--border-bright); }
        .qa-card-front { color: var(--cyan); font-weight: 600; }
        .qa-card-back { background: #0d1117; color: var(--text-dim); transform: rotateY(180deg); text-align: left; line-height: 1.5; }

        @media (max-width: 600px) {
            body { padding: 0; }
            .terminal { border-radius: 0; border-left: none; border-right: none; }
            .terminal-body { padding: 16px; }
            .age-big { font-size: 36px; }
            .skills-grid { grid-template-columns: repeat(2, 1fr); }
            .qa-container { grid-template-columns: 1fr; }
        }
    </style>
</head>

        const alphabet = katakana + latin;
        const fontSize = 14;

        const matrixColors = ['#3fb950', '#bc8cff', '#d29922', '#58a6ff', '#f85149'];

        let currentMatrixColor = matrixColors[currentColorIndex];

        for (let i = 0; i < columns; i++) {
            drops[i] = Math.floor(Math.random() * canvas.height / fontSize);
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(8, 12, 16, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = currentMatrixColor;
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }

        function calcAge() {
            const birth = new Date(1996, 9, 25);
            const now = new Date();
            let age = now.getFullYear() - birth.getFullYear();
            const m = now.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age--;
            return age;
        }
        function calcDaysAlive() { return Math.floor((new Date() - new Date(1996, 9, 25)) / 86400000).toLocaleString('de-DE'); }
        function calcDaysToBirthday() {
            const now = new Date();
            let next = new Date(now.getFullYear(), 9, 25);
            if (next <= now) next.setFullYear(next.getFullYear() + 1);
            return Math.ceil((next - now) / 86400000);
        }

        async function addLine(text, cls='output', extraDelay=0) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'line ' + cls;
                    div.innerHTML = text;   // allows anchor tags
                    output.appendChild(div);
                    requestAnimationFrame(() => div.classList.add('visible'));
                    output.scrollTop = output.scrollHeight;
                    resolve(div);
                }, extraDelay);
            });
        }
        const delay = ms => new Promise(r => setTimeout(r, ms));

        async function typeCommand(cmd, totalMs=600) {
            const div = document.createElement('div');
            div.className = 'line cmd visible';
            div.innerHTML = '<span class="prompt">saddem</span><span class="at">@</span><span class="host">fachinformatiker</span> <span style="color:var(--text-dim)">~</span> <span style="color:var(--text-muted)">%</span> ';
            output.appendChild(div);
            const span = document.createElement('span');
            div.appendChild(span);
            const perChar = totalMs / cmd.length;
            for (const c of cmd) { span.textContent += c; await delay(perChar); }
            output.scrollTop = output.scrollHeight;
        }

        function showElement(el, displayType='block') {

            requestAnimationFrame(() => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(8px)';
                el.style.transition = 'opacity 0.4s, transform 0.4s';
                requestAnimationFrame(() => {

            });
        }

        async function animateProgress(bar, targetPct, durationMs) {
            const steps = 40;
            const stepMs = durationMs / steps;
            for (let i = 1; i <= steps; i++) {
                bar.style.width = (targetPct * i / steps) + '%';
                await delay(stepMs);
            }
        }

        function createInteractivePrompt() {
            const inputLine = document.createElement('div');
            inputLine.className = 'input-line';
            inputLine.innerHTML = '<span class="prompt-text"><span class="prompt">saddem</span><span class="at">@</span><span class="host">fachinformatiker</span> <span style="color:var(--text-dim)">~</span> <span style="color:var(--text-muted)">%</span> </span>';
            const input = document.createElement('input');
            input.type = 'text';
            input.id = 'user-input';
            input.autocomplete = 'off';
            input.spellcheck = false;
            inputLine.appendChild(input);
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'input-cursor';
            inputLine.appendChild(cursorSpan);
            output.appendChild(inputLine);
            requestAnimationFrame(() => inputLine.classList.add('visible'));
            input.focus();

            input.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.value.trim();
                    if (!cmd) return;
                    commandHistory.push(cmd);
                    historyIndex = commandHistory.length;
                    inputLine.remove();
                    const executed = document.createElement('div');
                    executed.className = 'line cmd visible';
                    executed.innerHTML = '<span class="prompt">saddem</span><span class="at">@</span><span class="host">fachinformatiker</span> <span style="color:var(--text-dim)">~</span> <span style="color:var(--text-muted)">%</span> ' + cmd;
                    output.appendChild(executed);
                    await processCommand(cmd);
                    output.scrollTop = output.scrollHeight;
                    createInteractivePrompt();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (commandHistory.length) {
                        historyIndex = Math.max(0, historyIndex-1);
                        input.value = commandHistory[historyIndex] || '';
                    }
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (commandHistory.length) {
                        historyIndex = Math.min(commandHistory.length-1, historyIndex+1);
                        input.value = commandHistory[historyIndex] || '';
                    } else input.value = '';
                }
            });

            input.addEventListener('blur', () => setTimeout(() => input.focus(), 10));
            return inputLine;
        }

        async function processCommand(cmd) {
            const lower = cmd.toLowerCase();
            if (lower === 'lang de') {
                sessionStorage.setItem(LANG_KEY, 'de');
                location.href = location.pathname + '?lang=de';
                return;
            }
            if (lower === 'lang en') {
                sessionStorage.setItem(LANG_KEY, 'en');
                location.href = location.pathname + '?lang=en';
                return;
            }
            switch(lower) {
                case 'hilfe': case 'help':
                    await addLine(t('helpCmd'), 'bright');
                    for (const h of t('helpList')) await addLine('  ' + h, 'output');
                    break;
                case 'skills':
                    await addLine('Technische Skills:', 'bright');
                    await addLine(t('skills').join(', '), 'output');
                    break;
                case 'erfahrung': case 'experience':
                    await addLine(currentLang==='de'?'Karriere-Timeline:':'Career Timeline:', 'bright');
                    for (const item of t('journey')) await addLine(`  • ${item.year}: ${item.role} – ${item.org}`, 'output');
                    break;
                case 'kontakt': case 'contact':
                    await addLine(currentLang==='de'?'Kontakt & Profile:':'Contact & Profiles:', 'bright');
                    await addLine('  GitHub:  <a href="https://github.com/saddemyousfi" target="_blank" style="color:var(--cyan);text-decoration:underline;">github.com/saddemyousfi</a>', 'info');
                    await addLine('  LinkedIn: <a href="https://linkedin.com/in/saddemyousfi" target="_blank" style="color:var(--cyan);text-decoration:underline;">linkedin.com/in/saddemyousfi</a>', 'info');
                    await addLine('  E-Mail:  <a href="mailto:saddemyoussfi@gmail.com" style="color:var(--cyan);text-decoration:underline;">saddemyoussfi@gmail.com</a>', 'info');
                    break;
                case 'whoami':
                    await addLine('Saddem Yousfi', 'bright');
                    await addLine(currentLang==='de'?'Geboren am 25.10.1996 in Sousse, Tunesien':'Born 25.10.1996 in Sousse, Tunisia', 'output');
                    await addLine(currentLang==='de'?'Wohnhaft in Tunis, Tunesien':'Living in Tunis, Tunisia', 'output');
                    await addLine(currentLang==='de'?'Ziel: Fachinformatiker Ausbildung (Anwendungsentwicklung/Systemintegration) in Deutschland':'Target: Fachinformatiker apprenticeship in Germany', 'warn');
                    await addLine((currentLang==='de'?'Aktuelles Alter: ':'Current age: ') + calcAge() + (currentLang==='de'?' Jahre':' years'), 'output');
                    break;
                case 'alter': case 'age':
                    await addLine((currentLang==='de'?'Aktuelles Alter: ':'Current age: ') + calcAge() + (currentLang==='de'?' Jahre':' years'), 'bright');
                    await addLine(`${calcDaysAlive()} ${t('ageDays')} · ${t('ageUntil')} ${calcDaysToBirthday()} ${t('ageUntilSuffix')}`, 'output');
                    break;
                case 'projekte': case 'projects':
                    await addLine('GitHub Repositories:', 'bright');
                    await addLine('  <a href="https://github.com/saddemyousfi?tab=repositories" target="_blank" style="color:var(--cyan);text-decoration:underline;">github.com/saddemyousfi?tab=repositories</a>', 'info');
                    break;
                case 'hobbies':
                    await addLine(t('hobbiesTitle'), 'bright');
                    await addLine(t('hobbiesList'), 'output');
                    break;
                case 'fragen': case 'qa':
                    await showQA();
                    break;
                case 'clear':
                    output.innerHTML = '';
                    break;
                case 'home':
                    location.reload();
                    break;
                default:
                    await addLine(`bash: ${cmd}: command not found`, 'error');
            }
        }

        async function showQA() {
            const qaDiv = document.createElement('div');
            qaDiv.className = 'qa-container';
            t('qaQuestions').forEach(item => {
                const card = document.createElement('div');
                card.className = 'qa-card';
                card.innerHTML = `<div class="qa-card-inner">
                    <div class="qa-card-front">${item.q}</div>
                    <div class="qa-card-back">${item.a}</div>
                </div>`;
                card.addEventListener('click', () => card.classList.toggle('flipped'));
                qaDiv.appendChild(card);
            });
            output.appendChild(qaDiv);
            await addLine(' ', 'output');
            await addLine(currentLang==='de' ? 'Klicke auf eine Karte, um die Antwort zu sehen.' : 'Click a card to reveal the answer.', 'info');
            output.scrollTop = output.scrollHeight;
        }
