<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddem Yousfi | Professional Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #64ffda;
            --bg: #0a192f;
            --card: #112240;
            --text: #ccd6f6;
            --text-dim: #8892b0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 900px;
            padding: 40px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(100, 255, 218, 0.1);
        }

        header { text-align: center; margin-bottom: 60px; }
        header h1 { font-size: 2rem; color: #fff; margin: 0; }
        header p { color: var(--primary); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; }

        .timeline {
            position: relative;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 100px 0;
        }

        #progress-bar {
            position: absolute;
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.5s ease-out;
        }

        .avatar {
            position: absolute;
            top: -50px;
            left: 0%;
            transform: translateX(-50%);
            font-size: 40px;
            transition: left 0.5s ease-out;
            filter: drop-shadow(0 0 10px rgba(100, 255, 218, 0.5));
            z-index: 10;
        }

        .milestone {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .dot {
            width: 16px;
            height: 16px;
            background: var(--bg);
            border: 3px solid #233554;
            border-radius: 50%;
            transition: all 0.4s ease;
        }

        .milestone.active .dot {
            border-color: var(--primary);
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .milestone .label {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            transition: color 0.4s;
        }

        .milestone.active .label { color: #fff; }

        .info-panel {
            background: rgba(2, 12, 27, 0.7);
            border-radius: 12px;
            padding: 30px;
            border-left: 4px solid var(--primary);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #info-title { color: var(--primary); font-weight: bold; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
        #info-desc { line-height: 1.6; font-size: 0.95rem; color: var(--text-dim); }

        @media (max-width: 600px) {
            .milestone .label { display: none; }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Beruflicher Werdegang</h1>
        <p>> saddem.evolution.init()</p>
    </header>

    <div class="timeline">
        <div id="progress-bar"></div>
        <div id="avatar" class="avatar">🎓</div>
        
        <!-- Milestones calculated by % -->
        <div class="milestone" style="left: 0%;" data-index="0"><div class="dot"></div><div class="label">Studium</div></div>
        <div class="milestone" style="left: 25%;" data-index="1"><div class="dot"></div><div class="label">Proofreading</div></div>
        <div class="milestone" style="left: 50%;" data-index="2"><div class="dot"></div><div class="label">Aviation</div></div>
        <div class="milestone" style="left: 75%;" data-index="3"><div class="dot"></div><div class="label">Integration</div></div>
        <div class="milestone" style="left: 100%;" data-index="4"><div class="dot"></div><div class="label">IT / QA</div></div>
    </div>

    <div class="info-panel">
        <div id="info-title">Status: Standby</div>
        <div id="info-desc">Warten auf Systemstart...</div>
    </div>
</div>

<script>
    const journeyData = [
        { title: "B.A. ENGLISCH & LITERATUR", desc: "Grundsteinlegung für internationale Kommunikation und analytisches Denken in Tunis.", icon: "🎓" },
        { title: "GOMYCODE | IT-REDAKTION", desc: "Qualitätssicherung von IT-Lehrmaterialien. Erste Berührungspunkte mit technischer Logik und Präzision.", icon: "✍️" },
        { title: "ETIHAD AIRWAYS | FLIGHT ATTENDANT", desc: "Krisenmanagement und strikte Einhaltung internationaler Sicherheitsstandards (SOPs) weltweit.", icon: "✈️" },
        { title: "DEUTSCH-INTEGRATION (B2)", desc: "Gezielte Vorbereitung auf den deutschen Arbeitsmarkt und Erwerb des TELC B2 Zertifikats.", icon: "🇩🇪" },
        { title: "SOFTWARE QA SPEZIALISIERUNG", desc: "Fokus auf Testautomatisierung und ISTQB-Standards. Bereit für die Fachinformatiker Ausbildung 2026!" }
    ];

    const progressBar = document.getElementById('progress-bar');
    const avatar = document.getElementById('avatar');
    const milestones = document.querySelectorAll('.milestone');
    const infoTitle = document.getElementById('info-title');
    const infoDesc = document.getElementById('info-desc');

    let currentStep = 0;

    function updateJourney(step) {
        const percentage = step * 25;
        progressBar.style.width = `${percentage}%`;
        avatar.style.left = `${percentage}%`;
        avatar.innerText = journeyData[step].icon;
        
        milestones.forEach((m, idx) => {
            if (idx <= step) m.classList.add('active');
            else m.classList.remove('active');
        });

        infoTitle.innerText = `PHASE ${step + 1}: ${journeyData[step].title}`;
        infoDesc.innerText = journeyData[step].desc;
    }

    // Auto-run animation sequence
    function runAnimation() {
        const timer = setInterval(() => {
            updateJourney(currentStep);
            currentStep++;
            if (currentStep >= journeyData.length) clearInterval(timer);
        }, 1800);
    }

    // Start when page is loaded
    window.onload = runAnimation;
</script>

</body>
</html>
