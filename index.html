<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddem's Journey | From Sky to Code</title>
    <style>
        :root { --primary: #64ffda; --bg: #0a192f; --text: #ccd6f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .timeline-container { width: 90%; max-width: 800px; text-align: center; }
        .stage-container { display: flex; justify-content: space-between; position: relative; margin-top: 50px; padding-bottom: 20px; }
        .line { position: absolute; top: 25px; left: 5%; right: 5%; height: 2px; background: rgba(255,255,255,0.1); z-index: 1; }
        .progress-line { position: absolute; top: 25px; left: 5%; height: 2px; background: var(--primary); z-index: 2; width: 0%; transition: width 3s ease-in-out; }
        
        .guy { font-size: 30px; position: absolute; top: -10px; left: 5%; transition: left 3s ease-in-out; z-index: 3; }
        
        .phase { position: relative; z-index: 4; width: 60px; }
        .dot { width: 12px; height: 12px; background: #112240; border: 2px solid #444; border-radius: 50%; margin: 20px auto 10px; transition: 0.5s; }
        .phase.active .dot { border-color: var(--primary); background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .label { font-size: 0.65rem; font-weight: bold; opacity: 0.5; transition: 0.5s; }
        .phase.active .label { opacity: 1; color: var(--primary); }
        
        .description-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-top: 40px; min-height: 100px; border: 1px solid rgba(100, 255, 218, 0.1); }
        h1 { font-size: 1.2rem; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="timeline-container">
    <h1>Die Entwicklung von Saddem</h1>
    <p style="font-size: 0.8rem; opacity: 0.7;">Klicken Sie, um meine Reise zu sehen</p>

    <div class="stage-container" onclick="startAnimation()">
        <div class="line"></div>
        <div class="progress-line" id="progress"></div>
        <div class="guy" id="guy">👨🏽‍🎓</div>
        
        <div class="phase" id="p1"><div class="dot"></div><div class="label">B.A. Englisch</div></div>
        <div class="phase" id="p2"><div class="dot"></div><div class="label">Gomycode</div></div>
        <div class="phase" id="p3"><div class="dot"></div><div class="label">Etihad</div></div>
        <div class="phase" id="p4"><div class="dot"></div><div class="label">Deutsch B2</div></div>
        <div class="phase" id="p5"><div class="dot"></div><div class="label">QA / IT</div></div>
    </div>

    <div class="description-box" id="desc">
        Klicke auf die Zeitleiste, um die Animation zu starten...
    </div>
</div>

<script>
    const data = [
        { icon: "👨🏽‍🎓", text: "<b>Akademischer Fokus:</b> Abschluss in englischer Sprache & Literatur. Grundstein für globale Kommunikation." },
        { icon: "✍️", text: "<b>Gomycode:</b> Einstieg in die IT-Welt als Korrektor für Lehrmaterialien. Fokus auf technische Präzision." },
        { icon: "✈️", text: "<b>Etihad Airways:</b> Internationales Krisenmanagement & strikte Einhaltung von SOPs in einem Hochdruckumfeld." },
        { icon: "🇩🇪", text: "<b>Integration:</b> Erwerb des TELC B2 Zertifikats. Vorbereitung auf den deutschen Arbeitsmarkt[cite: 1, 4]." },
        { icon: "💻", text: "<b>Software QA:</b> Spezialisierung auf Testautomatisierung & ISTQB Standards. Bereit für die Ausbildung 2026[cite: 4]!" }
    ];

    function startAnimation() {
        const guy = document.getElementById('guy');
        const progress = document.getElementById('progress');
        const desc = document.getElementById('desc');
        
        let step = 0;
        const interval = setInterval(() => {
            if (step >= data.length) {
                clearInterval(interval);
                return;
            }
            
            // Move guy and progress
            guy.style.left = (step * 22.5 + 5) + "%";
            progress.style.width = (step * 22.5) + "%";
            guy.innerText = data[step].icon;
            desc.innerHTML = data[step].text;
            
            // Activate dots
            document.getElementById('p' + (step + 1)).classList.add('active');
            
            step++;
        }, 1500);
    }
</script>

</body>
</html>
